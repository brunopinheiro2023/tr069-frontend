# Map dinâmico para Socket.IO: resolve upgrade para WebSocket e close para HTTP puro
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream para backend com sticky sessions (ip_hash)
# Garante que WebSocket do mesmo cliente sempre vai para o mesmo worker PM2
upstream backend {
    ip_hash;
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    # Arquivos estáticos do Angular (build de produção)
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para reduzir tamanho dos assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── PROXY: Socket.IO (WebSocket + long-polling) ──────────────────────────
    # DEVE vir antes de /api/ para evitar conflito de rotas
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers obrigatórios para upgrade WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts longos: sessões CWMP e WebSocket podem durar minutos
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── PROXY: ACS (CPEs TR-069 — protocolo CWMP/SOAP) ───────────────────────
    # CPEs enviam Inform e recebem comandos nesta rota
    location /acs {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Sem "keepalive" no upstream (ver bloco upstream acima) — cada requisição abre
        # uma conexão NOVA do Nginx pro backend, então req.socket.remotePort no Node é
        # sempre a porta efêmera do Nginx (muda a cada request), nunca a porta real da
        # CPE. $remote_port é a porta do socket que a CPE abriu direto no Nginx — a
        # peça que faltava pra cwmpController.js reconstruir a chave de sessão
        # "ip:porta" resistente a CGNAT como o design original pretendia.
        # proxy_set_header SEMPRE sobrescreve (não repassa) — não é forjável pela CPE.
        proxy_set_header X-Real-Port $remote_port;

        # TR-069 sessions can take long. Limite de 180s para garantir folga
        # em relação aos 120s de timeout do frontend Angular.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;

        # Suporte a body XML grande (provisioning)
        client_max_body_size 10m;
    }

    # ── PROXY: Auth (login JWT do Angular) ───────────────────────────────────
    location /auth/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── PROXY: API REST (dashboard Angular) ──────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── SPA ROUTING: Angular (todas as rotas restantes) ──────────────────────
    # O Angular gerencia suas próprias rotas (/dashboard, /login, etc.)
    # try_files: tenta arquivo estático → fallback para index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache agressivo para assets com hash no nome (ex: main.abc123.js)
        location ~* \.(js|css|png|jpg|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
