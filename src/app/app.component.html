@if (router.url !== '/login') {
  <div class="app-layout" [class.sidebar-open]="sidebarOpen">
    <!-- Sidebar retrátil (mobile: off-canvas overlay; desktop: fixa) -->
    <app-sidebar
      [mobileOpen]="sidebarOpen"
      (closeSidebar)="sidebarOpen = false"
    ></app-sidebar>

    <!-- Overlay escurecido em mobile quando sidebar aberta -->
    <div
      class="sidebar-backdrop"
      [class.active]="sidebarOpen"
      (click)="sidebarOpen = false"
      aria-hidden="true"
    ></div>

    <main class="main-content">
      <app-header
        [sidebarOpen]="sidebarOpen"
        (toggleSidebar)="sidebarOpen = !sidebarOpen"
      ></app-header>

      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Loading Global (overlay em tela cheia) -->
  @if (globalLoading$ | async) {
    <div class="global-loading-overlay" aria-live="polite" aria-busy="true">
      <div class="global-loading-spinner"></div>
      <p class="global-loading-text">Processando...</p>
    </div>
  }
} @else {
  <router-outlet></router-outlet>
}

<!-- Toast global: visível em todas as páginas -->
<app-toast-container></app-toast-container>
