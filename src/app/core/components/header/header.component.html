<header class="header">
  <!-- Botão hamburger: visível apenas em mobile (< 1024px) -->
  <button
    class="hamburger-btn"
    (click)="onToggleSidebar()"
    [attr.aria-expanded]="sidebarOpen"
    aria-label="Alternar menu de navegação"
    type="button"
  >
    <span class="material-symbols-rounded">menu</span>
  </button>

  <div class="header-title">
    <h1>Visão Geral</h1>
    <p>Monitoramento em tempo real do tráfego e saúde das CPEs.</p>
  </div>

  <div class="header-actions">
    <!-- P4: Indicador de status WebSocket — feedback visual em tempo real -->
    <div class="ws-status-indicator"
         [class.ws-connected]="wsStatus === 'connected'"
         [class.ws-disconnected]="wsStatus === 'disconnected'"
         [class.ws-reconnecting]="wsStatus === 'reconnecting'"
         [title]="wsStatusLabel"
         role="status"
         [attr.aria-label]="wsStatusLabel">
      <span class="ws-dot"></span>
      <span class="ws-label">{{ wsStatusLabel }}</span>
    </div>

    <button
      class="theme-toggle-btn"
      (click)="toggleTheme()"
      [title]="isDarkMode ? 'Alternar para tema claro' : 'Alternar para tema escuro'"
      type="button"
    >
      <span class="material-symbols-rounded">
        {{ isDarkMode ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>

    <div class="user-profile">
      <div class="avatar" aria-hidden="true">{{ userInitials }}</div>
      <span class="user-name">{{ username }}</span>
    </div>

    <button
      class="logout-btn"
      (click)="logout()"
      title="Sair do sistema"
      type="button"
    >
      <span class="material-symbols-rounded">logout</span>
    </button>
  </div>
</header>
